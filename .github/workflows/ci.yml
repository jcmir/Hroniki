name: CI

on:
  push:
    branches: [ "main", "feature/**", "fix/**" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────
  # Job 1: Rust — clippy, fmt, test
  # ─────────────────────────────────────────
  rust:
    name: Rust (clippy · fmt · test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --all

  # ─────────────────────────────────────────
  # Job 2: Frontend — build (Tauri)
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (npm build)
    runs-on: ubuntu-latest
    needs: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  # ─────────────────────────────────────────
  # Job 3: Security audit (cargo-audit)
  # ─────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: rust
    continue-on-error: true  # Не блокирует PR, только предупреждает

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        working-directory: src-tauri
        run: cargo audit
